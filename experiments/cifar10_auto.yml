project: bayesian_cifar10
name: cifar10_hpo_test
out-dir: out
data-dir: data
test-noise: data/z/z_2048_64
fixed-noise: 2500

device: cuda:0
num-workers: 6

fid-stats-path: data/fid-stats/stats.inception.cifar10.5v3.npz

num-runs: 1

dataset:
  name: cifar10
  binary:
    pos: 5
    neg: 3

model:
  z_dim: 64
  architecture:
    name: cifar10_sagan
    g_filter_dim: 64
    d_filter_dim: 64
    g_num_blocks: 3
    d_num_blocks: 3
  loss:
    name: hinge-r1
    args:
      lambda: 10.0

optimizer:
  lr: 0.0002
  beta1: 0.0
  beta2: 0.9

train:
  step-1:
    epochs: 120
    checkpoint-every: 10
    disc-iters: 2
    batch-size: 64

  step-2:
    epochs: 40
    checkpoint-every: 10
    step-1-epochs:
      - best
    batch-size: 64
    disc-iters: 2
    weight:
      - gaussian:
          alpha: 1.0
          var: 0.01
    classifier: ["models/cifar10/5v3/cnn-50-50.4441"]
