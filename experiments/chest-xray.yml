project: bayesian_chest_xray
name: chest_xray_hpo_test

out-dir: out
data-dir: data
test-noise: data/z/z_512_64
fixed-noise: 64

device: cuda:0
num-workers: 4

fid-stats-path: data/fid-stats/stats.inception.chest-xray.1v0.npz

num-runs: 1

dataset:
  name: chest-xray
  binary:
    pos: 1
    neg: 0

model:
  z_dim: 64
  architecture:
    name: chest-xray
    g_filter_dim: 64
    d_filter_dim: 64
    g_num_blocks: 3
    d_num_blocks: 3
  loss:
    name: hinge-r1
    args:
      lambda: 10.0

optimizer:
  lr: 0.0002
  beta1: 0.0
  beta2: 0.9

train:
  step-1:
    epochs: 80
    checkpoint-every: 5
    disc-iters: 2
    batch-size: 8

  step-2:
    epochs: 30
    checkpoint-every: 5
    step-1-epochs:
      - best
    batch-size: 8
    disc-iters: 2
    weight:
      - gaussian:
          alpha: 1.0
          var: 0.01
    classifier:
      - "models/chest-xray/1v0/cnn-24-24-4441"
