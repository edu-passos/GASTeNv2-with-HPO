project: gasten_fashion_mnist
name: fashion-mnist-4v2_test
out-dir: out
data-dir: data
test-noise: data/z/z_2048_64
fixed-noise: 2500

device: cuda:0
num-workers: 6

fid-stats-path: data/fid-stats/stats.inception.fashion-mnist.5v3.npz

num-runs: 1

dataset:
  name: fashion-mnist
  binary:
    pos: 5
    neg: 3

model:
  z_dim: 64
  architecture:
    name: dcgan
    g_filter_dim: 64
    d_filter_dim: 64
    g_num_blocks: 3
    d_num_blocks: 3
  loss:
    name: wgan-gp
    args:
      lambda: 10.0

optimizer:
  lr: 0.0001
  beta1: 0.0
  beta2: 0.9

train:
  step-1:
    epochs: 80
    checkpoint-every: 5
    disc-iters: 5
    batch-size: 128

  step-2:
    epochs: 30
    checkpoint-every: 5
    step-1-epochs:
      - best
    batch-size: 128
    disc-iters: 3
    classifier: ["models/fashion-mnist/5v3/cnn-12-12.4441"]
    weight:
      - gaussian:
          alpha: 1.0
          var: 0.01
